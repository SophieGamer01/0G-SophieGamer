<!DOCTYPE html>
<html lang="en" dir="ltr" id="app-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Gravity Hub | Sophie Gamer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ مهم جداً يا صوفي: هنا لازم تحط معلومات الـ Firebase مالتك حتى التفاعلات تصير علنية لكل الناس!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // أنا خليت الكود يشتغل حتى لو ما حطيت المفاتيح (حتى تشوف الشكل)، بس من تحطها راح يصير حقيقي!
        try {
            const app = initializeApp(firebaseConfig);
            window.db = getDatabase(app);
            window.dbRef = ref; window.dbSet = set; window.dbUpdate = update; window.dbOnValue = onValue;
            console.log("Firebase Connected!");
        } catch (e) {
            console.log("Firebase not configured yet. Running in UI mode.");
        }
    </script>

    <style>
        :root {
            --ios-bg: #0f0f13;
            --ios-card: rgba(28, 28, 30, 0.7);
            --ios-border: rgba(255, 255, 255, 0.1);
            --ios-text: #ffffff;
            --ios-blue: #0a84ff;
            --ios-green: #30d158;
            --app-font: -apple-system, sans-serif;
            --bg-image: none;
        }

        body {
            background-color: var(--ios-bg); background-image: var(--bg-image);
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--ios-text); font-family: var(--app-font); margin: 0; padding: 20px; padding-bottom: 100px;
        }

        .card { background: var(--ios-card); backdrop-filter: blur(20px); border: 1px solid var(--ios-border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        
        .btn { background: var(--ios-blue); color: #fff; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .input-box { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--ios-border); color: white; padding: 12px; border-radius: 12px; box-sizing: border-box; }
        
        /* شبكة الخلفيات */
        .bg-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .bg-item { height: 50px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; background-size: cover; background-position: center; }
        .bg-item:hover { border-color: white; }

        iframe { width: 100%; border-radius: 15px; border: none; aspect-ratio: 16/9; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--ios-blue);">Zero Gravity Hub</h1>

    <div class="card">
        <h3>📺 آخر فيديو بالقناة (تلقائي)</h3>
        <div id="latest-video-container">
            <p>جاري سحب أحدث فيديو من قناة @sophiegamer01...</p>
        </div>
    </div>

    <div class="card" id="login-section">
        <h3>تسجيل الدخول / حساب جديد</h3>
        <input type="text" id="username" class="input-box" placeholder="اسم المستخدم">
        
        <div style="margin-top: 15px;">
            <div class="g-recaptcha" data-sitekey="YOUR_RECAPTCHA_SITE_KEY"></div>
        </div>
        
        <button class="btn" onclick="verifyLogin()">تحقق ودخول</button>
    </div>

    <div class="card">
        <h3>🎁 أكواد الهدايا</h3>
        <input type="text" id="promo-code" class="input-box" placeholder="أدخل الكود هنا">
        <button class="btn" onclick="checkPromoCode()">استرداد الكود</button>
        <p id="promo-result" style="text-align: center; font-weight: bold; margin-top: 10px;"></p>
    </div>

    <div class="card">
        <h3>💬 مجتمع السيرفر (مباشر)</h3>
        <input type="text" id="post-text" class="input-box" placeholder="اكتب رسالتك هنا...">
        <button class="btn" style="background: var(--ios-green);" onclick="addPost()">نشر</button>
        
        <div id="posts-feed" style="margin-top: 20px;">
            </div>
    </div>

    <div class="card">
        <h3>🎵 الموسيقى</h3>
        <select id="music-select" class="input-box" onchange="changeMusic()">
            <option value="">إيقاف الموسيقى</option>
            <option value="https://cdn.pixabay.com/download/audio/2022/02/22/audio_d1718ab41b.mp3">موسيقى حماسية 1</option>
            <option value="https://cdn.pixabay.com/download/audio/2021/11/24/audio_91b3cb11e2.mp3">موسيقى فضائية 2</option>
            <option value="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3">موسيقى هادئة 3</option>
        </select>
        <button class="btn" onclick="document.getElementById('music-upload').click()">استيراد موسيقى من جهازي 📥</button>
        <input type="file" id="music-upload" accept="audio/*" style="display: none;" onchange="importMusic(event)">
        <audio id="bg-audio" loop></audio>

        <h3 style="margin-top: 20px;">🖼️ 10 خلفيات ثابتة</h3>
        <div class="bg-grid" id="static-bgs"></div>

        <h3 style="margin-top: 20px;">✨ 5 خلفيات متحركة (GIF)</h3>
        <div class="bg-grid" id="gif-bgs"></div>
        
        <button class="btn" onclick="document.getElementById('bg-upload').click()" style="margin-top: 15px;">استيراد خلفية من جهازي 📥</button>
        <input type="file" id="bg-upload" accept="image/*" style="display: none;" onchange="importBg(event)">
    </div>

    <script>
        // ----------------- 1. جلب فيديو يوتيوب تلقائياً -----------------
        // ⚠️ مهم: لازم تحط الـ Channel ID الحقيقي مالتك بمكان YOUR_CHANNEL_ID (يبدأ بحرف UC)
        const channelId = "YOUR_CHANNEL_ID"; 
        const rssUrl = `https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
        
        fetch(rssUrl)
            .then(res => res.json())
            .then(data => {
                if(data.items && data.items.length > 0) {
                    // يأخذ أول فيديو (أحدث واحد)
                    const latestVideoUrl = data.items[0].link;
                    const videoId = latestVideoUrl.split('v=')[1];
                    document.getElementById('latest-video-container').innerHTML = `
                        <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
                        <p style="text-align:center; font-weight:bold; margin-top:10px;">${data.items[0].title}</p>
                    `;
                } else {
                    document.getElementById('latest-video-container').innerHTML = `<p style="color:yellow;">حط الـ Channel ID مالتك بالكود حتى يظهر الفيديو!</p>`;
                }
            })
            .catch(err => console.log("Youtube Fetch Error", err));

        // ----------------- 2. نظام أكواد الهدايا المتعدد -----------------
        const validCodes = {
            "SOPHIE2026": "🎉 مبروك! حصلت على باقة زيرو جرافيتي!",
            "TEAMFLAME": "🔥 مبروك! حصلت على رتبة تيم فليم!",
            "MODY": "💎 مبروك! حصلت على 500 كوينز!"
        };

        function checkPromoCode() {
            const input = document.getElementById('promo-code').value.toUpperCase().trim();
            const resultMsg = document.getElementById('promo-result');
            
            if (validCodes[input]) {
                resultMsg.style.color = "var(--ios-green)";
                resultMsg.innerText = validCodes[input];
            } else {
                resultMsg.style.color = "red";
                resultMsg.innerText = "❌ الكود غير صحيح أو منتهي الصلاحية!";
            }
        }

        // ----------------- 3. إعدادات الخلفيات والموسيقى -----------------
        const staticColors = ['#1a1a2e', '#16213e', '#0f3460', '#e94560', '#533483', '#2c003e', '#000000', '#112233', '#330000', '#002200'];
        const gifUrls = [
            'https://media.giphy.com/media/xT9IgzoKnwFNmISR8I/giphy.gif', // فضاء
            'https://media.giphy.com/media/26n7b7PjSOZJwVCmY/giphy.gif', // نجوم
            'https://media.giphy.com/media/3o7aD2d7qc9qS3260c/giphy.gif', // سايبر
            'https://media.giphy.com/media/l41YcGT5ShJa0vcCk/giphy.gif', // تكنولوجيا
            'https://media.giphy.com/media/xT0xezQGU5x3CEbRu8/giphy.gif'  // أضواء
        ];

        // توليد أزرار الخلفيات الثابتة
        const staticGrid = document.getElementById('static-bgs');
        staticColors.forEach(color => {
            const div = document.createElement('div');
            div.className = 'bg-item';
            div.style.background = color;
            div.onclick = () => { document.body.style.backgroundImage = 'none'; document.body.style.backgroundColor = color; };
            staticGrid.appendChild(div);
        });

        // توليد أزرار الخلفيات المتحركة
        const gifGrid = document.getElementById('gif-bgs');
        gifUrls.forEach(url => {
            const div = document.createElement('div');
            div.className = 'bg-item';
            div.style.backgroundImage = `url(${url})`;
            div.onclick = () => { document.body.style.backgroundImage = `url(${url})`; };
            gifGrid.appendChild(div);
        });

        // استيراد خلفية وموسيقى
        function importBg(e) {
            if(e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) { document.body.style.backgroundImage = `url(${event.target.result})`; }
                reader.readAsDataURL(e.target.files[0]);
            }
        }

        const audioPlayer = document.getElementById('bg-audio');
        function changeMusic() {
            const selected = document.getElementById('music-select').value;
            if(selected) { audioPlayer.src = selected; audioPlayer.play(); } 
            else { audioPlayer.pause(); }
        }
        function importMusic(e) {
            if(e.target.files[0]) {
                audioPlayer.src = URL.createObjectURL(e.target.files[0]);
                audioPlayer.play();
            }
        }

        // ----------------- 4. تسجيل الدخول و ريكابتشا -----------------
        function verifyLogin() {
            // التحقق من أن المستخدم داس على مربع "أنا لست روبوت"
            const recaptchaResponse = grecaptcha.getResponse();
            const username = document.getElementById('username').value.trim();
            
            if(username === "") return alert("اكتب اسمك أولاً!");
            
            // إذا كنت ما حاط Site Key الحقيقي، الـ response راح يرجع فارغ، لذلك ضفت هذا التنبيه
            if(recaptchaResponse.length === 0) {
                alert("الرجاء إكمال اختبار الكابتشا (أنا لست روبوت) أو تأكد من إضافة الـ Site Key الحقيقي بالكود.");
            } else {
                alert("تم تسجيل الدخول بنجاح يا " + username + "!");
                document.getElementById('login-section').style.display = 'none';
                localStorage.setItem('sophie_currentUser', username);
            }
        }

        // ----------------- 5. التفاعلات الوهمية (حتى تربط الفايربيس) -----------------
        let localPosts = [];
        function addPost() {
            const text = document.getElementById('post-text').value;
            const user = localStorage.getItem('sophie_currentUser') || "مجهول";
            if(text) {
                localPosts.unshift({ user: user, text: text, likes: 0 });
                document.getElementById('post-text').value = '';
                renderLocalPosts();
            }
        }
        function likePost(index) {
            localPosts[index].likes++;
            renderLocalPosts();
        }
        function renderLocalPosts() {
            const feed = document.getElementById('posts-feed');
            feed.innerHTML = '';
            localPosts.forEach((post, index) => {
                feed.innerHTML += `
                    <div style="background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; margin-bottom: 10px;">
                        <strong style="color: var(--ios-blue);"><i class="fa-solid fa-user"></i> ${post.user}</strong>
                        <p style="margin: 8px 0;">${post.text}</p>
                        <button class="btn" style="width: auto; padding: 5px 15px; background: transparent; border: 1px solid var(--ios-border);" onclick="likePost(${index})">
                            <i class="fa-solid fa-heart" style="color: red;"></i> ${post.likes}
                        </button>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
