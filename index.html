<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero-Gravity Hub | Sophie Gamer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, update, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://g-sophiegamer-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db; // Export for global use
        window.ref = ref;
        window.onValue = onValue;
        window.update = update;
        window.set = set;
        window.get = get;
    </script>

    <style>
        /* [باقي الـ CSS مالتك الأصلي كما هو] */
        :root { --ios-bg: #000000; --ios-card: rgba(28, 28, 30, 0.6); --ios-card-border: rgba(255, 255, 255, 0.08); --ios-text: #ffffff; --ios-subtext: #ebebf599; --ios-blue: #0a84ff; --ios-pink: #ff2d55; --ios-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; --blur-effect: blur(20px); }
        html, body { min-height: 100vh; margin: 0; padding: 0; background-color: var(--ios-bg); background-image: radial-gradient(circle at 50% 0%, #1a0b2e 0%, #000000 60%); background-attachment: fixed; color: var(--ios-text); font-family: var(--ios-font); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; }
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0, 0, 0, 0.5); backdrop-filter: var(--blur-effect); -webkit-backdrop-filter: var(--blur-effect); border-bottom: 0.5px solid var(--ios-card-border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; }
        .nav-logo { font-weight: 700; font-size: 1.2rem; letter-spacing: 1px; color: var(--ios-text); }
        .user-nav-profile { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 20px; cursor: pointer; }
        .user-icon-img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background: #333; }
        .user-name-txt { font-size: 0.9rem; font-weight: 500; }
        .bottom-tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(15, 15, 15, 0.7); backdrop-filter: var(--blur-effect); -webkit-backdrop-filter: var(--blur-effect); border-top: 0.5px solid var(--ios-card-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--ios-subtext); text-decoration: none; font-size: 0.7rem; cursor: pointer; transition: color 0.2s; }
        .tab-item i { font-size: 1.4rem; }
        .tab-item.active { color: var(--ios-blue); }
        .app-container { padding: 85px 20px 100px 20px; max-width: 800px; margin: 0 auto; }
        .view-section { display: none; animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .view-section.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .ios-card { background: var(--ios-card); backdrop-filter: var(--blur-effect); -webkit-backdrop-filter: var(--blur-effect); border: 0.5px solid var(--ios-card-border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .section-header { font-size: 1.5rem; font-weight: 700; margin-bottom: 15px; }
        .timer-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .time-block { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 15px; min-width: 80px; text-align: center; border: 0.5px solid rgba(255,255,255,0.1); }
        .time-block span { font-size: 2rem; font-weight: 700; display: block; }
        .time-block label { font-size: 0.75rem; color: var(--ios-subtext); text-transform: uppercase; }
        .ios-btn { background: var(--ios-blue); color: #fff; border: none; padding: 14px 20px; border-radius: 14px; font-size: 1rem; font-weight: 600; width: 100%; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
        .ios-btn:active { transform: scale(0.97); opacity: 0.8; }
        .ios-btn.pink { background: var(--ios-pink); }
        .ios-input { width: 100%; background: rgba(0,0,0,0.3); border: 0.5px solid var(--ios-card-border); color: var(--ios-text); padding: 14px; border-radius: 12px; font-size: 1rem; margin-bottom: 12px; outline: none; }
        .ios-input:focus { border-color: var(--ios-blue); }
        .leader-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid var(--ios-card-border); }
        .leader-row:last-child { border-bottom: none; }
        .leader-info { display: flex; align-items: center; gap: 12px; }
        .rank-num { font-weight: bold; width: 25px; color: var(--ios-subtext); }
        .lang-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .lang-btn { background: rgba(255,255,255,0.05); border: 0.5px solid var(--ios-card-border); padding: 12px; border-radius: 12px; color: var(--ios-text); text-align: center; cursor: pointer; }
        .lang-btn.active-lang { border-color: var(--ios-blue); background: rgba(10, 132, 255, 0.1); }
    </style>
</head>
<body>
    <script>
        // ... (كود التايمر ونظام اللغة والتبويبات مالتك يبقى نفسه) ...

        // ربط السيرفر وتحديث الصدارة
        function renderLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            const boardRef = ref(window.db, 'leaderboard');
            onValue(boardRef, (snapshot) => {
                const data = snapshot.val() || {};
                let displayBoard = Object.keys(data).map(name => ({ name, points: data[name].points }));
                displayBoard.sort((a, b) => b.points - a.points);
                
                list.innerHTML = "";
                displayBoard.forEach((user, index) => {
                    const avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.name}`;
                    list.innerHTML += `<div class="leader-row"><div class="leader-info"><span class="rank-num">#${index + 1}</span><img src="${avatarUrl}" class="user-icon-img"><span style="font-weight:600;">${user.name}</span></div><span style="color:var(--ios-blue); font-weight:bold;">${user.points} pts</span></div>`;
                });
            });
        }

        // تفعيل الكود وحفظه بالسيرفر
        function redeemCode() {
            if(!currentUser) return alert(translations[currentLang].err_login_first);
            const code = document.getElementById('promo-input').value.trim().toUpperCase();
            const validCodes = { "SOPHIE2026": 1000, "ZERO": 500 };
            
            if (validCodes[code]) {
                const userRef = ref(window.db, 'leaderboard/' + currentUser.name);
                currentUser.points += validCodes[code];
                update(userRef, { points: currentUser.points });
                alert(translations[currentLang].success_code + validCodes[code]);
                document.getElementById('promo-input').value = "";
            }
        }
    </script>
</body>
</html>
